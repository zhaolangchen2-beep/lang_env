# ==========================================
# 基础连接配置
# ==========================================
# 1. JobManager 的主机名 (对应 docker-compose 里的服务名)
jobmanager.rpc.address: jobmanager

# 2. RPC 通信端口 (机器之间对话用)
jobmanager.rpc.port: 6123

# 3. Web UI 端口 (人看网页用)
# 只要这里写了 8081，Flink 就会在容器里监听 8081，不管镜像原本怎么定义的
rest.port: 8081

# ==========================================
# 关键：解除网络封锁 (Binding)
# ==========================================
# 设为 0.0.0.0 代表监听所有网卡，允许容器之间、容器与宿主机通信
jobmanager.bind-host: 0.0.0.0
taskmanager.bind-host: 0.0.0.0
rest.bind-address: 0.0.0.0
rest.bind-port: 8081

# ==========================================
# 资源配置
# ==========================================
taskmanager.numberOfTaskSlots: 2